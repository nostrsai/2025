# Update all sections by editing the data.yml file inside _data folder.

# Site Settings
title: Timothy Horn // 2026 Systems Portfolio
url: 'https://nostrsai.github.io/2026/'

# change it according to your repository name
# disabling since we are using a custom domain
# baseurl: '/online-cv'

description: 2026 systems, infrastructure, Bitcoin, Nostr and AI portfolio for Timothy Horn.
# Style will be applied only after restarting the build or serve. Just choose one of the options.
theme_skin: blue # blue turquoise green berry orange ceramic
chrome_mobile_color: '#05070d'

# Tracker
analytics: UA-83979019-1

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Build settings
compress-site: yes

encoding: "utf-8"
compress_html: # - http://jch.penibelst.de/
  clippings: all
  ignore:
    envs: development

# Development Settings
port: 4000
host: 0.0.0.0
safe: false
